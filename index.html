        "url": "https://www.aha.org/lettercomment/2026-02-19-aha-comments-hrsas-rfi-re-340b-rebate-model-pilot-program-hhs-docket-no-hrsa-2026-03042",

  {

    "sources": [

        "publisher": "RWC-340B",

      },
      {
        "title": "340B Manufacturer Restriction on Contract Pharmacies Chart",
        "url": "https://www.nachc.org/resource/340b-manufacturer-restriction-on-contract-pharmacies-chart/",
        "publisher": "NACHC",
        "date": "2026-04-15"
      }
    ],
    "tags": [
      "Alkermes",
      "Viatris",
      "contract pharmacy"
    ],
    "updates": []
  }
];

const CATEGORIES = [
  ["hrsa", "HRSA"],
  ["manufacturer", "Manufacturer"],
  ["litigation", "Litigation"],
  ["federal_legislation", "Federal Legislation"],
  ["state_legislation", "State Legislation"],
  ["oversight", "Oversight"],
  ["stakeholder", "Stakeholder"],
  ["operational", "Operational"],
];
const PRIORITIES = [["high","High"],["medium","Medium"],["low","Low"]];

const state = {
  cats: new Set(),
  pris: new Set(),
  q: "",
  from: "",
  to: "",
};

// Build header counts
function renderHeaderCounts() {
  document.getElementById("total-count").textContent = CORPUS.length;
  const counts = {};
  for (const e of CORPUS) counts[e.category] = (counts[e.category] || 0) + 1;
  const wrap = document.getElementById("cat-counts");
  wrap.innerHTML = "";
  for (const [k, label] of CATEGORIES) {
    if (!counts[k]) continue;
    const s = document.createElement("span");
    s.textContent = label + " ";
    const b = document.createElement("b");
    b.textContent = counts[k];
    s.appendChild(b);
    wrap.appendChild(s);
  }
}

function buildFilterChips(containerId, items, stateSet) {
  const c = document.getElementById(containerId);
  c.innerHTML = "";
  for (const [k, label] of items) {
    const el = document.createElement("button");
    el.type = "button";
    el.className = "chip";
    el.textContent = label;
    el.addEventListener("click", () => {
      if (stateSet.has(k)) stateSet.delete(k); else stateSet.add(k);
      el.classList.toggle("active");
      render();
    });
    c.appendChild(el);
  }
}

function entryMatches(e) {
  if (state.cats.size && !state.cats.has(e.category)) return false;
  if (state.pris.size && !state.pris.has(e.priority)) return false;
  if (state.from && (e.event_date || "") < state.from) return false;
  if (state.to && (e.event_date || "") > state.to) return false;
  if (state.q) {
    const hay = [
      e.title || "",
      e.summary || "",
      (e.tags || []).join(" "),
      (e.key_actors || []).join(" "),
      e.subcategory || "",
    ].join(" ").toLowerCase();
    if (!hay.includes(state.q.toLowerCase())) return false;
  }
  return true;
}

function fmtDate(s) {
  if (!s) return "";
  // YYYY-MM-DD → "Mon DD, YYYY"
  const parts = s.split("-");
  if (parts.length !== 3) return s;
  const y = parts[0], m = parseInt(parts[1],10), d = parseInt(parts[2],10);
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return months[m-1] + " " + d + ", " + y;
}

function catLabel(k) {
  for (const [c,l] of CATEGORIES) if (c === k) return l;
  return k;
}

function escapeHtml(s) {
  return (s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

function cardHTML(e) {
  const sources = (e.sources || []).map(s =>
    `<li><a href="${encodeURI(s.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(s.title)}</a>` +
    (s.publisher ? `<span class="pub">— ${escapeHtml(s.publisher)}${s.date ? ", " + escapeHtml(s.date) : ""}</span>` : "") +
    `</li>`
  ).join("");
  const actors = (e.key_actors || []).map(a => `<span class="actor">${escapeHtml(a)}</span>`).join("");
  const updates = (e.updates || []).length
    ? `<div class="updates"><b>Updates</b><ul>${e.updates.map(u => `<li><span class="date">${escapeHtml(u.date||"")}</span>${escapeHtml(u.note||"")}</li>`).join("")}</ul></div>`
    : "";
  return `
    <article class="card" id="${escapeHtml(e.id)}">
      <div class="card-meta">
        <span class="cat">${escapeHtml(catLabel(e.category))}</span>
        <span class="pri pri-${escapeHtml(e.priority||"low")}">${escapeHtml((e.priority||"low").toUpperCase())}</span>
        <span class="subcat">${escapeHtml(e.subcategory||"")}</span>
        <span class="event-date">${escapeHtml(fmtDate(e.event_date))}</span>
      </div>
      <h3>${escapeHtml(e.title||"")}</h3>
      <p class="summary">${escapeHtml(e.summary||"")}</p>
      ${e.priority_rationale ? `<p class="pri-rationale">${escapeHtml(e.priority_rationale)}</p>` : ""}
      <div class="actors">${actors}</div>
      <div class="sources"><b>Sources</b><ul>${sources}</ul></div>
      ${updates}
    </article>
  `;
}

function groupByEventDate(entries) {
  const groups = {};
  for (const e of entries) {
    const k = e.event_date || "unknown";
    (groups[k] = groups[k] || []).push(e);
  }
  return Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(k => [k, groups[k]]);
}

function render() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  const lastUpdated = document.getElementById("last-updated").textContent;
  const todayAdds = CORPUS.filter(e => e.date_added === lastUpdated);

  // Today's adds — pinned, ignores filters except search (so you can find within)
  if (todayAdds.length) {
    const banner = document.getElementById("today-banner");
    banner.style.display = "";
    document.getElementById("today-banner-count").textContent = todayAdds.length;
    document.getElementById("today-banner-date").textContent = fmtDate(lastUpdated);
    document.getElementById("today-count").textContent = todayAdds.length;

    const todayGroup = document.createElement("div");
    todayGroup.className = "day-group";
    todayGroup.innerHTML = `<div class="day-heading">Today's adds — ${fmtDate(lastUpdated)}</div>`;
    const visibleToday = todayAdds.filter(entryMatches).sort((a,b)=>(b.event_date||"").localeCompare(a.event_date||""));
    if (!visibleToday.length) {
      todayGroup.innerHTML += `<div class="empty">No today's-adds match the current filters.</div>`;
    } else {
      visibleToday.forEach(e => { todayGroup.insertAdjacentHTML("beforeend", cardHTML(e)); });
    }
    feed.appendChild(todayGroup);
  }

  // Rest of the corpus, grouped by event_date desc, excluding today's adds
  const rest = CORPUS.filter(e => e.date_added !== lastUpdated).filter(entryMatches);
  if (!rest.length && !todayAdds.length) {
    feed.insertAdjacentHTML("beforeend", `<div class="empty">No entries match the current filters.</div>`);
    return;
  }
  const groups = groupByEventDate(rest);
  for (const [date, items] of groups) {
    const g = document.createElement("div");
    g.className = "day-group";
    g.innerHTML = `<div class="day-heading">${fmtDate(date)}</div>`;
    items.sort((a,b)=>(b.id||"").localeCompare(a.id||""));
    items.forEach(e => { g.insertAdjacentHTML("beforeend", cardHTML(e)); });
    feed.appendChild(g);
  }
}

// Wire up
renderHeaderCounts();
buildFilterChips("cat-filter", CATEGORIES, state.cats);
buildFilterChips("pri-filter", PRIORITIES, state.pris);
document.getElementById("q").addEventListener("input", e => { state.q = e.target.value; render(); });
document.getElementById("from").addEventListener("change", e => { state.from = e.target.value; render(); });
document.getElementById("to").addEventListener("change", e => { state.to = e.target.value; render(); });
document.getElementById("clear-btn").addEventListener("click", () => {
  state.cats.clear(); state.pris.clear(); state.q = ""; state.from = ""; state.to = "";
  document.querySelectorAll(".chip.active").forEach(c => c.classList.remove("active"));
  document.getElementById("q").value = "";
  document.getElementById("from").value = "";
  document.getElementById("to").value = "";
  render();
});

render();
</script>
