<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>340B Intelligence — Internal GTM</title>
<style>
  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --border: #e6e6e3;
    --border-strong: #d2d2cd;
    --text: #1f2328;
    --text-soft: #57606a;
    --text-faint: #8b949e;
    --accent: #1e3a5f;
    --accent-soft: #e8eef5;
    --accent-strong: #15294a;
    --chip-bg: #eef0f3;
    --chip-text: #3a4147;
    --priority-high: #b42318;
    --priority-medium: #b54708;
    --priority-low: #6e7781;
    --status-complete: #1f7a3a;
    --status-stub: #b54708;
    --status-needs: #b42318;
    --gtm-bg: #fff8ec;
    --gtm-border: #e8d9b3;

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--text);
    background: var(--bg);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  header.topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .brand {
    font-weight: 600;
    font-size: 15px;
    color: var(--accent);
    letter-spacing: -0.01em;
  }
  .brand-sub {
    font-weight: 400;
    color: var(--text-faint);
    font-size: 13px;
    margin-left: 6px;
  }
  nav.tabs {
    display: flex;
    gap: 4px;
  }
  nav.tabs button {
    background: transparent;
    border: none;
    padding: 6px 12px;
    font-size: 14px;
    color: var(--text-soft);
    cursor: pointer;
    border-radius: 4px;
    font-family: inherit;
  }
  nav.tabs button:hover { background: var(--accent-soft); color: var(--accent); }
  nav.tabs button.active {
    color: var(--accent);
    font-weight: 600;
    background: var(--accent-soft);
  }
  .meta-strip {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-faint);
    text-align: right;
  }
  main { padding: 0; }
  .view { display: none; }
  .view.active { display: block; }

  /* LEARN VIEW */
  .learn-layout {
    display: grid;
    grid-template-columns: 240px minmax(0, 1fr) 300px;
    gap: 32px;
    padding: 28px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .left-rail { font-size: 13.5px; }
  .left-rail h3 {
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    margin: 0 0 10px 0;
    font-weight: 600;
  }
  .left-rail ul { list-style: none; padding: 0; margin: 0 0 24px 0; }
  .left-rail li {
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    color: var(--text);
    line-height: 1.4;
  }
  .left-rail li:hover { background: var(--accent-soft); }
  .left-rail li.active {
    background: var(--accent);
    color: white;
    font-weight: 500;
  }
  .left-rail li.active .stub-badge { color: white; }
  .stub-badge {
    font-size: 10px;
    color: var(--status-stub);
    margin-left: 4px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .left-rail-mobile {
    display: none;
    padding: 14px 20px 0;
  }
  .left-rail-mobile select {
    width: 100%;
    padding: 10px;
    font-size: 14px;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    background: var(--surface);
    font-family: inherit;
  }

  .learn-main {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 32px 40px;
    box-shadow: var(--shadow);
    min-width: 0;
  }
  .learn-main .kind-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .status-pill {
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--chip-bg);
    color: var(--chip-text);
    font-size: 10.5px;
    letter-spacing: 0.05em;
  }
  .status-pill.complete { background: #e8f3ec; color: var(--status-complete); }
  .status-pill.stub { background: #fff2dd; color: var(--status-stub); }
  .status-pill.needs_update { background: #fde8e6; color: var(--status-needs); }
  .learn-main h1 {
    font-size: 26px;
    margin: 4px 0 8px 0;
    color: var(--text);
    letter-spacing: -0.015em;
    line-height: 1.2;
  }
  .learn-main .summary {
    color: var(--text-soft);
    font-size: 15px;
    margin: 0 0 16px 0;
    font-style: italic;
    max-width: 70ch;
  }
  .last-updated {
    font-size: 12px;
    color: var(--text-faint);
    margin: 0 0 20px 0;
  }
  .learn-body { max-width: 70ch; }
  .learn-body h2 {
    font-size: 18px;
    margin: 28px 0 10px 0;
    color: var(--accent-strong);
    font-weight: 600;
  }
  .learn-body h3 {
    font-size: 15px;
    margin: 18px 0 6px 0;
    color: var(--text);
  }
  .learn-body p { margin: 0 0 14px 0; }
  .learn-body ul, .learn-body ol { margin: 0 0 14px 0; padding-left: 22px; }
  .learn-body li { margin-bottom: 6px; }
  .learn-body strong { font-weight: 600; }
  .learn-body em { color: var(--text-soft); }
  .learn-body a { color: var(--accent); }
  .learn-body code {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    background: var(--chip-bg);
    padding: 1px 5px;
    border-radius: 3px;
  }
  .gtm-block {
    margin: 28px 0;
    padding: 18px 22px;
    background: var(--gtm-bg);
    border: 1px solid var(--gtm-border);
    border-radius: 6px;
  }
  .gtm-label {
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: #8a6d2a;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .gtm-body { max-width: 70ch; }
  .gtm-body p { margin: 0 0 12px 0; }
  .gtm-body p:last-child { margin: 0; }
  .questions-block {
    margin: 24px 0;
    padding: 18px 22px;
    background: #f3f5f8;
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
  }
  .questions-block h4 {
    margin: 0 0 10px 0;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    font-weight: 600;
  }
  .questions-block ul { margin: 0; padding-left: 22px; }
  .related-row {
    margin-top: 32px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-soft);
  }
  .related-row strong { color: var(--text); font-weight: 600; margin-right: 6px; }
  .related-row a {
    color: var(--accent);
    text-decoration: none;
    margin-right: 12px;
  }
  .related-row a:hover { text-decoration: underline; }

  /* RIGHT RAIL */
  .right-rail h3 {
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    margin: 0 0 12px 0;
    font-weight: 600;
  }
  .news-mini {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    margin-bottom: 10px;
    font-size: 13px;
    cursor: pointer;
  }
  .news-mini:hover { border-color: var(--border-strong); }
  .news-mini .nm-date {
    font-size: 11px;
    color: var(--text-faint);
    margin-bottom: 4px;
  }
  .news-mini .nm-title {
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }
  .news-mini .nm-pri {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .nm-pri.high { background: var(--priority-high); }
  .nm-pri.medium { background: var(--priority-medium); }
  .nm-pri.low { background: var(--priority-low); }
  .show-more-btn {
    display: block;
    width: 100%;
    margin-top: 6px;
    padding: 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-soft);
    border-radius: 6px;
    cursor: pointer;
    font-size: 12.5px;
    font-family: inherit;
  }
  .show-more-btn:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-soft); }

  /* NEWS VIEW */
  .news-layout {
    display: grid;
    grid-template-columns: 260px minmax(0, 1fr);
    gap: 32px;
    padding: 28px;
    max-width: 1280px;
    margin: 0 auto;
  }
  .filters {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
    height: fit-content;
    position: sticky;
    top: 20px;
    font-size: 13px;
  }
  .filters h3 {
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    margin: 0 0 12px 0;
    font-weight: 600;
  }
  .filter-group { margin-bottom: 18px; }
  .filter-group label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    cursor: pointer;
    color: var(--text);
  }
  .filter-group input[type="checkbox"] { margin: 0; cursor: pointer; }
  .filter-search input,
  .filter-group input[type="date"] {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    font-size: 13px;
    font-family: inherit;
  }
  .filter-group input[type="date"] { margin-bottom: 6px; }
  .filter-clear-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 12px;
    cursor: pointer;
    padding: 0;
    text-decoration: underline;
    font-family: inherit;
  }
  .news-day-group {
    margin-bottom: 28px;
  }
  .news-day-header {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    font-weight: 600;
    margin: 0 0 10px 0;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .news-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 22px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .news-card-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .priority-pill {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }
  .priority-pill.high { background: #fde8e6; color: var(--priority-high); }
  .priority-pill.medium { background: #fdf2dd; color: var(--priority-medium); }
  .priority-pill.low { background: var(--chip-bg); color: var(--priority-low); }
  .category-pill {
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 2px 8px;
    border-radius: 10px;
    text-transform: capitalize;
  }
  .news-card h3 {
    font-size: 16px;
    margin: 0 0 6px 0;
    color: var(--text);
    font-weight: 600;
    line-height: 1.35;
  }
  .news-card .subcategory {
    font-size: 12px;
    color: var(--text-faint);
    margin-bottom: 6px;
  }
  .news-card .summary {
    color: var(--text-soft);
    font-size: 14px;
    line-height: 1.55;
    max-width: 70ch;
    margin-bottom: 10px;
  }
  .news-card .priority-rationale {
    color: var(--text-soft);
    font-size: 12.5px;
    font-style: italic;
    margin-bottom: 12px;
    max-width: 70ch;
  }
  .news-card .actors {
    font-size: 12px;
    color: var(--text-faint);
    margin-bottom: 10px;
  }
  .news-card .concept-chips {
    margin-bottom: 10px;
  }
  .concept-chip {
    display: inline-block;
    background: var(--accent-soft);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11.5px;
    margin: 0 4px 4px 0;
    cursor: pointer;
    border: 1px solid transparent;
    transition: border-color 0.1s;
  }
  .concept-chip:hover { border-color: var(--accent); }
  .news-card .sources {
    font-size: 12px;
    color: var(--text-faint);
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .news-card .sources a {
    color: var(--accent);
    margin-right: 12px;
    text-decoration: none;
  }
  .news-card .sources a:hover { text-decoration: underline; }
  .news-card .tags {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 8px;
  }
  .news-card .tags span {
    background: var(--chip-bg);
    padding: 1px 7px;
    border-radius: 8px;
    margin-right: 4px;
  }
  .news-card .update-note {
    font-size: 12px;
    color: var(--text-soft);
    background: #f3f5f8;
    padding: 6px 10px;
    border-radius: 4px;
    margin-top: 8px;
  }

  /* SEARCH VIEW */
  .search-layout {
    padding: 28px;
    max-width: 1000px;
    margin: 0 auto;
  }
  .search-input-row {
    margin-bottom: 24px;
  }
  .search-input-row input {
    width: 100%;
    padding: 12px 16px;
    font-size: 16px;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    background: var(--surface);
    font-family: inherit;
  }
  .search-input-row input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .search-meta {
    color: var(--text-faint);
    font-size: 13px;
    margin-bottom: 16px;
  }
  .search-group {
    margin-bottom: 28px;
  }
  .search-group h3 {
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    font-weight: 600;
    margin: 0 0 10px 0;
  }
  .search-result {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 18px;
    margin-bottom: 8px;
    cursor: pointer;
  }
  .search-result:hover { border-color: var(--accent); }
  .search-result h4 {
    margin: 0 0 4px 0;
    font-size: 14.5px;
    font-weight: 600;
    color: var(--text);
  }
  .search-result .sr-summary {
    color: var(--text-soft);
    font-size: 13px;
    line-height: 1.5;
    max-width: 70ch;
  }
  .search-result .sr-meta {
    font-size: 11.5px;
    color: var(--text-faint);
    margin-top: 6px;
  }
  mark { background: #fff2a8; padding: 0 2px; }

  footer {
    text-align: center;
    padding: 28px;
    font-size: 12px;
    color: var(--text-faint);
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }

  /* Responsive */
  @media (max-width: 1000px) {
    .learn-layout { grid-template-columns: 220px minmax(0, 1fr); padding: 20px; gap: 24px; }
    .learn-layout .right-rail { grid-column: 1 / -1; }
    .right-rail h3 { margin-top: 8px; }
  }
  @media (max-width: 720px) {
    header.topbar { padding: 12px 16px; gap: 12px; }
    .meta-strip { display: none; }
    .learn-layout { grid-template-columns: 1fr; padding: 0; gap: 0; }
    .left-rail { display: none; }
    .left-rail-mobile { display: block; }
    .learn-main {
      border-radius: 0;
      border-left: none;
      border-right: none;
      padding: 20px;
    }
    .news-layout { grid-template-columns: 1fr; padding: 16px; }
    .filters { position: static; margin-bottom: 16px; }
    .search-layout { padding: 16px; }
  }
</style>
</head>

f a sector-wide clearinghouse framework.", "key_actors": ["AHA", "Eli Lilly", "HRSA"], "priority": "high", "priority_rationale": "First major industry-side proposal of a workable alternative to manufacturer-imposed claims-data submission; reframes the data-policy fight.", "sources": [{"title": "AHA urges Lilly to drop 340B claims-data policy, proposes neutral clearinghouse", "url": "https://www.aha.org/news/headline/2026-05-13-aha-urges-lilly-drop-340b-claims-data-policy-proposes-neutral-clearinghouse", "publisher": "AHA News", "date": "2026-05-13"}, {"title": "AHA Urges Lilly to Drop 340B Claims-Data Policy, Proposes Neutral Clearinghouse", "url": "https://www.aha.org/lettercomment/2026-05-13-aha-urges-lilly-drop-340b-claims-data-policy-proposes-neutral-clearinghouse", "publisher": "AHA", "date": "2026-05-13"}], "tags": ["AHA", "Eli Lilly", "neutral clearinghouse", "claims data"], "concept_ids": ["manufacturer-restrictions", "industry-actors"], "updates": []}, {"id": "2026-05-wsj-editorial-340b", "date_added": "2026-05-15", "event_date": "2026-05-12", "category": "stakeholder", "subcategory": "WSJ Editorial Board", "title": "Wall Street Journal editorial board renews call for 340B reform, backs rebate model", "summary": "The Wall Street Journal editorial board published a mid-May 2026 piece criticizing 340B program growth and oversight, characterizing hospital participation as exploiting the program at manufacturer expense. The editorial supports HRSA's rebate-model concept and frames 340B reform as a preferable alternative to drug-price negotiation. PhRMA amplified the op-ed.", "key_actors": ["Wall Street Journal Editorial Board", "PhRMA"], "priority": "low", "priority_rationale": "Stakeholder positioning, not operational; useful as context for the broader policy environment.", "sources": [{"title": "Wall Street Journal Editorial Takes Aim at 340B Program, PhRMA Touts Op-Ed", "url": "https://340breport.com/wall-street-journal-editorial-takes-aim-at-340b-program-phrma-touts-op-ed/", "publisher": "340B Report", "date": "2026-05-13"}, {"title": "Wall Street Journal raises new alarms about 340B", "url": "https://www.thepharmaletter.com/pharma-news/wall-street-journal-raises-new-alarms-about-340b", "publisher": "The Pharma Letter", "date": "2026-05-13"}], "tags": ["WSJ", "editorial", "PhRMA", "reform"], "concept_ids": ["industry-actors", "rebate-models"], "updates": []}, {"id": "2026-05-08-ezell-reverses", "date_added": "2026-05-15", "event_date": "2026-05-08", "category": "federal_legislation", "subcategory": "House — Dear Colleague letters", "title": "Rep. Ezell reverses earlier support for 340B rebate model", "summary": "Rep. Mike Ezell (R-MS) on May 8, 2026 sent a letter warning that a 340B rebate model could have 'disastrous effects' on covered entities — reversing an earlier sign-on to a Harshbarger/Carter Dear Colleague letter urging the Trump administration to adopt a rebate model. The reversal occurred against a backdrop of 90+ bipartisan House members signing a separate letter urging that no federal funds be used to implement a rebate model.", "key_actors": ["Rep. Ezell", "Rep. Harshbarger", "Rep. Carter", "Trump administration"], "priority": "low", "priority_rationale": "Symbolic signal of softening GOP support for the rebate concept; useful color for handicapping any rebate-model revival.", "sources": [{"title": "GOP Lawmaker Reverses Course on Earlier Support for 340B Rebates", "url": "https://340breport.com/gop-lawmaker-reverses-course-on-earlier-support-for-340b-rebates/", "publisher": "340B Report", "date": "2026-05-09"}, {"title": "Two GOP Lawmakers Circulate Letter Supporting 340B Rebates as Eight Senate Democrats Join Effort Opposing Them", "url": "https://340breport.com/two-gop-lawmakers-circulate-letter-supporting-340b-rebates-as-eight-senate-democrats-join-effort-opposing-them/", "publisher": "340B Report", "date": "2026-05-05"}], "tags": ["Ezell", "rebate model", "Dear Colleague", "House"], "concept_ids": ["federal-legislation", "rebate-models"], "updates": []}, {"id": "2026-05-asco-policy", "date_added": "2026-05-15", "event_date": "2026-05-05", "category": "stakeholder", "subcategory": "ASCO", "title": "ASCO releases first major 340B policy update in over a decade", "summary": "ASCO published an updated 340B policy statement proposing an Indigent Care Ratio (ICR) for practice eligibility, caps on contract-pharmacy administrative fees, mandatory public reporting of how 340B savings are reinvested in patient care, and a tightened patient-definition standard requiring an ongoing clinical relationship with the covered entity.", "key_actors": ["ASCO"], "priority": "medium", "priority_rationale": "Influential oncology-society position; may shape provider-side reform proposals in any future legislation.", "sources": [{"title": "ASCO Updates 340B Policy Statement to Expand Access, Improve Transparency", "url": "https://www.cancernetwork.com/view/asco-updates-340b-policy-statement-to-expand-access-improve-transparency", "publisher": "CancerNetwork", "date": "2026-05-06"}, {"title": "ASCO Updates Policy Statement on 340B Drug Pricing Program", "url": "https://www.asco.org/about-asco/press-center/news-releases/asco-updates-policy-statement-340B-drug-pricing-program", "publisher": "ASCO", "date": "2026-05-05"}], "tags": ["ASCO", "policy", "oncology", "ICR"], "updates": [], "concept_ids": ["industry-actors"]}, {"id": "2026-05-house-dear-colleague-rebate-block", "date_added": "2026-05-15", "event_date": "2026-05-05", "category": "federal_legislation", "subcategory": "House — appropriations rider", "title": "90+ bipartisan House members urge block on federal funds for 340B rebate model", "summary": "More than 90 bipartisan House members signed a Dear Colleague letter urging that no federal funds be used to implement a 340B rebate model. The signers cite cash-flow impact on safety-net providers and unresolved litigation. The letter is paired with the introduced bipartisan House bill specifically barring imposition of rebate models on FQHCs and other grantees and is a likely vehicle for an appropriations rider this cycle.", "key_actors": ["U.S. House", "AHA", "FQHCs", "America's Essential Hospitals"], "priority": "medium", "priority_rationale": "Broad bipartisan signaling raises the political cost of a rebate-model revival and sets up an appropriations-rider play.", "sources": [{"title": "On the Hill: Nearly 100 Bipartisan House Members Urge No Federal Funds for 340B Rebate Model", "url": "https://essentialhospitals.org/on-the-hill-nearly-100-bipartisan-house-members-urge-no-federal-funds-for-340b-rebate-model/", "publisher": "America's Essential Hospitals", "date": "2026-05-06"}, {"title": "House Members Circulate Letter to Ban 340B Rebate Model in Federal Funding Bill", "url": "https://340breport.com/house-members-circulate-letter-to-ban-340b-rebate-model-in-federal-funding-bill/", "publisher": "340B Report", "date": "2026-05-05"}], "tags": ["House", "Dear Colleague", "rebate model", "appropriations"], "concept_ids": ["federal-legislation", "rebate-models"], "updates": []}, {"id": "2026-05-01-organon-truzo", "date_added": "2026-05-15", "event_date": "2026-05-01", "category": "operational", "subcategory": "Clearinghouse transition", "title": "Organon becomes third manufacturer to move 340B operations to Kalderos Truzo", "summary": "Effective May 1, 2026, Organon moved its 340B contract-pharmacy claims review and policy oversight from 340B ESP to Kalderos' Truzo platform. Organon joins Alkermes and Puma on Truzo, with Gilead transitioning June 15, 2026. The continued migration fragments operational compliance across two clearinghouses, requiring covered entities to maintain dual registration and parallel data-submission workflows.", "key_actors": ["Organon", "Kalderos", "Second Sight Solutions"], "priority": "medium", "priority_rationale": "Compounds the operational tax of running compliance across two clearinghouses; raises near-term TPA reconfiguration work for affected entities.", "sources": [{"title": "Organon to Move to Truzo, Becomes 3rd Drugmaker to Use Kalderos' Platform for 340B Contract Pharmacy Restrictions", "url": "https://340breport.com/organon-to-move-to-truzo-becomes-3rd-drugmaker-to-use-kalderos-platform-for-340b-contract-pharmacy-restrictions/", "publisher": "340B Report", "date": "2026-03-20"}], "tags": ["Organon", "Kalderos", "Truzo", "ESP", "clearinghouse"], "concept_ids": ["tpas-and-clearinghouses", "manufacturer-restrictions"], "updates": []}, {"id": "2026-04-27-aha-hrsa-data-action", "date_added": "2026-05-15", "event_date": "2026-04-27", "category": "stakeholder", "subcategory": "AHA — HRSA action request", "title": "AHA asks HRSA to prohibit drug company 340B claims-data policies", "summary": "AHA wrote HRSA on April 27, 2026, asking the agency to prohibit manufacturer-imposed claims-data policies and to consider civil monetary penalties under its 340B enforcement authority. The letter followed Lilly's most recent warning letters to hospitals and reports that at least two AHA member entities had temporarily lost 340B pricing access. AHA asked that HRSA either act or publicly explain its decision not to act.", "key_actors": ["AHA", "HRSA", "Eli Lilly"], "priority": "medium", "priority_rationale": "Escalates the AHA's record-of-action against manufacturer data policies; conditions HRSA's posture for any future enforcement decision.", "sources": [{"title": "AHA Request for HRSA Action on Drug Company 340B Data Policies", "url": "https://www.aha.org/lettercomment/2026-04-27-aha-request-hrsa-action-drug-company-340b-data-policies", "publisher": "AHA", "date": "2026-04-27"}, {"title": "AHA urges HRSA to act as Eli Lilly threatens 340B discounts over claims data submission policy", "url": "https://www.aha.org/news/headline/2026-04-27-aha-urges-hrsa-act-eli-lilly-threatens-340b-discounts-over-claims-data-submission-policy", "publisher": "AHA News", "date": "2026-04-27"}], "tags": ["AHA", "HRSA", "claims data", "CMP"], "concept_ids": ["manufacturer-restrictions", "industry-actors"], "updates": []}, {"id": "2026-q1-sustain-stalled", "date_added": "2026-05-15", "event_date": "2026-04-25", "category": "federal_legislation", "subcategory": "Senate — SUSTAIN Act", "title": "SUSTAIN Act introduction stalled; rebate provisions reportedly out", "summary": "The bipartisan Senate working group (Thune, Baldwin, Moran, Capito, Cardin, Stabenow) signaled that the SUSTAIN Act discussion draft is unlikely to include 340B rebate provisions, but internal disagreements — including disputes tied to unrelated cultural-issue riders — continue to delay formal introduction. Senate HELP Chair Cassidy has separately signaled standalone 340B legislative plans.", "key_actors": ["Sen. Thune", "Sen. Baldwin", "Sen. Moran", "Sen. Capito", "Sen. Cardin", "Sen. Stabenow", "Sen. Cassidy"], "priority": "medium", "priority_rationale": "Major comprehensive 340B legislation remains unlikely in 2026 — useful context for what is and isn't moving.", "sources": [{"title": "SUSTAIN Act's Introduction Stalled Amid Talks on 340B Rebates, Hot-Button Issues", "url": "https://340breport.com/sustain-acts-introduction-stalled-amid-talks-on-340b-rebates-hot-button-issues/", "publisher": "340B Report", "date": "2026-04-28"}, {"title": "Senate HELP Chair Cassidy Signals 340B Legislation Plans", "url": "https://340breport.com/senate-help-chair-cassidy-signals-340b-legislation-plans-g6-senator-promises-sustain-act-update-soon-at-nachc-conference/", "publisher": "340B Report", "date": "2026-04-22"}], "tags": ["SUSTAIN Act", "Senate", "Cassidy"], "updates": [], "concept_ids": ["federal-legislation"]}, {"id": "2026-04-20-aha-rfi-comment", "date_added": "2026-05-15", "event_date": "2026-04-20", "category": "stakeholder", "subcategory": "AHA comment letter", "title": "AHA urges HRSA to abandon any 340B rebate model in RFI comment", "summary": "On the last day of the comment window, AHA filed a comment urging HRSA to abandon the rebate concept entirely, calling 'a rebate mechanism of any kind … flawed in both conception and design.' AHA estimated more than $1B in annual costs to 340B hospitals — including roughly $750M for new pharmacist FTEs and $400M in operational overhead — and flagged HRSA's revised data-collection burden estimate of five hours per entity per week.", "key_actors": ["AHA", "HRSA"], "priority": "high", "priority_rationale": "Defines hospital-sector position of record and quantifies operating impact for any future rebate rule.", "sources": [{"title": "AHA urges HRSA to abandon 340B rebate model that will cost billions", "url": "https://www.aha.org/news/headline/2026-04-20-aha-urges-hrsa-abandon-340b-rebate-model-will-cost-billions-and-jeopardize-access-care-millions", "publisher": "AHA News", "date": "2026-04-20"}, {"title": "AHA's Response to HRSA Request for Information Re: A Potential 340B Rebate Model Pilot Program", "url": "https://www.aha.org/lettercomment/2026-04-20-ahas-response-hrsa-request-information-re-potential-340b-rebate-model-pilot-program", "publisher": "AHA", "date": "2026-04-20"}], "tags": ["AHA", "RFI comment", "rebate model", "cost estimate"], "updates": [], "concept_ids": ["rebate-models", "industry-actors"]}, {"id": "2026-04-04cir-wv-blocked", "date_added": "2026-05-15", "event_date": "2026-04-15", "category": "litigation", "subcategory": "4th Circuit — West Virginia", "title": "4th Circuit blocks West Virginia 340B contract-pharmacy law as likely preempted", "summary": "The Fourth Circuit affirmed a preliminary injunction against West Virginia's S.B. 325, holding manufacturers are likely to succeed in showing the statute is preempted because it rewrites the federal 340B bargain and intrudes on HHS's exclusive enforcement role. The decision creates an explicit circuit split with the 5th, 7th, and 8th Circuits on state contract-pharmacy protections.", "key_actors": ["4th Circuit", "West Virginia", "PhRMA"], "priority": "high", "priority_rationale": "Creates a clear circuit split — strong candidate for Supreme Court review on state authority over 340B.", "sources": [{"title": "Fourth Circuit Blocks West Virginia's 340B Contract Pharmacy Law as Likely Preempted", "url": "https://www.consumerfinancialserviceslawmonitor.com/2026/04/fourth-circuit-blocks-west-virginias-340b-contract-pharmacy-law-as-likely-preempted/", "publisher": "Consumer Financial Services Law Monitor", "date": "2026-04-17"}], "tags": ["4th Circuit", "West Virginia", "preemption", "circuit split"], "updates": [], "concept_ids": ["state-protection-laws", "contract-pharmacies"]}, {"id": "2026-05-lilly-warning-letters", "date_added": "2026-05-15", "event_date": "2026-04-15", "category": "manufacturer", "subcategory": "Eli Lilly — enforcement", "title": "Lilly sends warning letters to covered entities over in-house 340B claims-data submission", "summary": "Eli Lilly began sending warning letters to covered entities through April–May 2026 demanding compliance with the February 1 in-house claims-data submission policy 'without further delay.' At least two hospitals temporarily lost 340B pricing access on Lilly products while submission disputes were resolved, according to AHA reporting. Lilly's position is that claims-data collection is necessary to prevent 'rampant fraud, waste, and abuse'; covered entities argue the policy lacks statutory grounding and imposes disproportionate operational cost.", "key_actors": ["Eli Lilly", "AHA", "covered entities"], "priority": "high", "priority_rationale": "First concrete enforcement actions — including brief 340B pricing suspensions — under a manufacturer claims-data policy; raises the immediate compliance bar.", "sources": [{"title": "Lilly Sends Warning Letters to Providers Over In-House 340B Claims Data Reporting Requirements", "url": "https://340breport.com/lilly-sends-warning-letters-to-providers-over-in-house-340b-claims-data-reporting-requirements/", "publisher": "340B Report", "date": "2026-04-22"}, {"title": "Hospitals decry drugmakers' expanded claims reporting policies for 340B", "url": "https://www.fiercehealthcare.com/providers/hospitals-decry-drugmakers-expanded-claims-reporting-policies-340b", "publisher": "Fierce Healthcare", "date": "2026-04-25"}], "tags": ["Eli Lilly", "warning letter", "claims data", "enforcement"], "concept_ids": ["manufacturer-restrictions", "tpas-and-clearinghouses"], "updates": []}, {"id": "2026-04-14-4cir-maryland-vacate", "date_added": "2026-05-15", "event_date": "2026-04-14", "category": "litigation", "subcategory": "4th Circuit — Maryland", "title": "4th Circuit vacates ruling upholding Maryland's 340B contract-pharmacy law", "summary": "A divided 4th Circuit panel (2-1) on April 14, 2026 vacated a district court ruling that had upheld Maryland's 340B contract-pharmacy access law, siding with manufacturers and reviving their challenge. Combined with the 4th Circuit's earlier West Virginia decision, the ruling solidifies the 4th Circuit as the appellate venue most favorable to manufacturers on state preemption and deepens the existing circuit split with the 5th, 7th, and 8th Circuits.", "key_actors": ["4th Circuit", "Maryland", "PhRMA"], "priority": "high", "priority_rationale": "Confirms the 4th Circuit's manufacturer-favorable posture across both major state cases in its circuit; cert posture intensifies.", "sources": [{"title": "4th Circuit Again Sides with Drugmakers, Vacates Ruling Upholding Maryland's 340B Contract Pharmacy Access Law", "url": "https://340breport.com/4th-circuit-again-sides-with-drugmakers-vacates-ruling-upholding-marylands-340b-contract-pharmacy-access-law/", "publisher": "340B Report", "date": "2026-04-15"}, {"title": "4th Circ. Revives Pharma Bid To Block Maryland's 340B Law", "url": "https://www.law360.com/articles/2465122/4th-circ-revives-pharma-bid-to-block-maryland-s-340b-law", "publisher": "Law360", "date": "2026-04-14"}], "tags": ["4th Circuit", "Maryland", "preemption", "circuit split"], "concept_ids": ["state-protection-laws", "contract-pharmacies"], "updates": []}, {"id": "2026-alkermes-viatris-restrictions", "date_added": "2026-05-15", "event_date": "2026-04-10", "category": "manufacturer", "subcategory": "Alkermes / Viatris", "title": "Alkermes and Viatris impose new 340B contract-pharmacy restrictions", "summary": "Alkermes and Viatris announced new 340B contract-pharmacy restrictions in early 2026, joining the now-40 manufacturers with active contract-pharmacy distribution limits. Alkermes's policy is paired with its move to the Kalderos Truzo clearinghouse; Viatris's policy follows a similar single-contract-pharmacy plus data-submission pattern.", "key_actors": ["Alkermes", "Viatris"], "priority": "medium", "priority_rationale": "Continues the steady manufacturer-by-manufacturer expansion of contract-pharmacy restrictions; meaningful for entities with concentrated pharmacy networks.", "sources": [{"title": "Alkermes and Viatris Impose 340B Program Contract Pharmacy Restrictions", "url": "https://rwc340b.org/alkermes-and-viatris-impose-340b-program-contract-pharmacy-restrictions/", "publisher": "RWC-340B", "date": "2026-04-12"}, {"title": "340B Manufacturer Restriction on Contract Pharmacies Chart", "url": "https://www.nachc.org/resource/340b-manufacturer-restriction-on-contract-pharmacies-chart/", "publisher": "NACHC", "date": "2026-04-15"}], "tags": ["Alkermes", "Viatris", "contract pharmacy"], "updates": [], "concept_ids": ["manufacturer-restrictions", "contract-pharmacies"]}, {"id": "2026-04-09-5cir-mississippi-affirm", "date_added": "2026-05-15", "event_date": "2026-04-09", "category": "litigation", "subcategory": "5th Circuit — Mississippi", "title": "5th Circuit rejects two more drugmaker challenges to Mississippi 340B contract-pharmacy law", "summary": "The Fifth Circuit on April 9, 2026 affirmed district court rulings denying Novartis and PhRMA preliminary injunctions against Mississippi's 340B contract-pharmacy access law. A subsequent panel denied Novartis's rehearing request. The decisions extend the 5th Circuit's pro-state line that includes Louisiana, reinforcing one side of the developing circuit split.", "key_actors": ["5th Circuit", "Mississippi", "Novartis", "PhRMA"], "priority": "high", "priority_rationale": "Strengthens the pro-state side of the contract-pharmacy preemption circuit split immediately ahead of likely SCOTUS cert activity.", "sources": [{"title": "Federal Appeals Court Rejects Two More Drugmaker Challenges to Mississippi's 340B Contract Pharmacy Access Law", "url": "https://340breport.com/federal-appeals-court-rejects-two-more-drugmaker-challenges-to-mississippis-340b-contract-pharmacy-access-law/", "publisher": "340B Report", "date": "2026-04-10"}, {"title": "Mississippi 340B law upheld by appeals court in two cases", "url": "https://www.aha.org/news/headline/2026-04-09-mississippi-340b-law-upheld-appeals-court-two-cases", "publisher": "AHA News", "date": "2026-04-09"}], "tags": ["5th Circuit", "Mississippi", "Novartis", "PhRMA", "preemption"], "concept_ids": ["state-protection-laws", "contract-pharmacies"], "updates": []}, {"id": "2026-04-01-novo-claims-mandate", "date_added": "2026-05-15", "event_date": "2026-04-01", "category": "manufacturer", "subcategory": "Novo Nordisk — claims data", "title": "Novo Nordisk 45-day claims-data rule takes effect for in-house and medical claims", "summary": "Effective April 1, 2026, Novo Nordisk requires covered entities to submit claim-level detail within 45 days of dispense for in-house pharmacy and medical-benefit dispenses. Failure to provide data may result in suspension of 340B pricing access.", "key_actors": ["Novo Nordisk"], "priority": "high", "priority_rationale": "Second large manufacturer to extend claims-data demands beyond contract pharmacy; raises industry-wide compliance bar.", "sources": [{"title": "Navigating Contract Pharmacy Restrictions in 2026", "url": "https://340breport.com/navigating-contract-pharmacy-restrictions-in-2026-sponcon-compassrx/", "publisher": "340B Report", "date": "2026-03-15"}, {"title": "340B Manufacturer Updates", "url": "https://www.amerisourcebergen.com/provider-solutions/hospitals-and-health-systems/340b-manufacturer-updates", "publisher": "Cencora", "date": "2026-04-01"}], "tags": ["claims data", "Novo Nordisk", "compliance"], "updates": [], "concept_ids": ["manufacturer-restrictions"]}, {"id": "2026-04-entresto-rebate", "date_added": "2026-05-15", "event_date": "2026-04-01", "category": "manufacturer", "subcategory": "Novartis — Entresto", "title": "Novartis adds Entresto to its 340B rebate posture on a delayed timeline", "summary": "Novartis added Entresto to the rebate posture with an April 1, 2026 start, three months later than the other initially-targeted drugs. With the broader HRSA pilot vacated, the practical effect is contingent on what HRSA does post-RFI; covered entities continue to receive the upfront discount.", "key_actors": ["Novartis"], "priority": "low", "priority_rationale": "Practical impact limited while the pilot remains vacated, but flags continuing manufacturer intent.", "sources": [{"title": "340B rebate model is set to proceed in 2026 with 9 drugs", "url": "https://www.hfma.org/accounting-and-financial-reporting/cost-of-care/340b-rebate-model-is-set-to-proceed-in-2026-with-9-drugs/", "publisher": "HFMA", "date": "2025-12-15"}], "tags": ["Novartis", "Entresto", "rebate model"], "updates": [], "concept_ids": ["rebate-models", "manufacturer-restrictions"]}, {"id": "2026-03-30-wa-phrma-suits", "date_added": "2026-05-15", "event_date": "2026-03-30", "category": "litigation", "subcategory": "W.D. Wash. — Washington state", "title": "PhRMA, Novartis, and AbbVie file separate suits against Washington's new 340B law", "summary": "Three separate federal complaints were filed in the Western District of Washington challenging Washington's newly signed 340B contract-pharmacy access and anti-data-mandate law. Plaintiffs argue ts", "url": "https://340breport.com/washington-governor-signs-sweeping-340b-law-immediately-draws-two-drugmaker-lawsuits/", "publisher": "340B Report", "date": "2026-03-26"}], "tags": ["Washington", "state law", "anti-data-mandate"], "updates": [], "concept_ids": ["state-protection-laws"]}, {"id": "2026-gao-26-108784", "date_added": "2026-05-15", "event_date": "2026-03-20", "category": "oversight", "subcategory": "GAO", "title": "GAO finds HRSA 340B oversight improved but flags persistent gaps", "summary": "GAO report GAO-26-108784 concluded that HRSA's 340B oversight has improved since prior reviews but identified continuing weaknesses, including in audit follow-up, duplicate-discount detection, and contract-pharmacy compliance review. GAO issued recommendations directed at HRSA's audit cadence and corrective-action tracking.", "key_actors": ["GAO", "HRSA"], "priority": "medium", "priority_rationale": "Federal oversight findings often drive subsequent HRSA program-integrity changes covered entities must adapt to.", "sources": [{"title": "GAO-26-108784 — 340B Drug Discount Program: Agency Oversight Has Improved, but Actions Needed", "url": "https://www.gao.gov/products/gao-26-108784", "publisher": "U.S. GAO", "date": "2026-03-20"}], "tags": ["GAO", "oversight", "audit", "duplicate discount"], "updates": [], "concept_ids": ["hrsa-audits", "duplicate-discounts"]}, {"id": "2026-q1-house-fqhc-bill", "date_added": "2026-05-15", "event_date": "2026-03-15", "category": "federal_legislation", "subcategory": "House — FQHC protection", "title": "House lawmakers introduce bipartisan bill to shield FQHCs from 340B rebate models", "summary": "A bipartisan House group introduced legislation to bar manufacturers from imposing rebate models on federally qualified health centers and other grantee covered entities. The bill is narrower than the broader PROTECT 340B / SUSTAIN frameworks and is positioned as a backstop if HRSA revives rebate rulemaking.", "key_actors": ["U.S. House", "
